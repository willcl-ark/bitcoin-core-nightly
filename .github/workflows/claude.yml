name: Claude Analysis

on:
  issues:
    types: [opened]

jobs:
  claude:
    if: contains(github.event.issue.labels.*.name, 'ci-failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          issue_number: ${{ github.event.issue.number }}
          prompt: |
            A nightly CI build has failed. The issue body contains a link to the
            failed workflow run. Fetch the workflow run logs using the GitHub API,
            identify the root cause of the failure, and determine whether it is a
            real failure or a false positive (e.g. transient infra issue).

            The project builds bitcoin/bitcoin using Nix. Post your analysis as a
            comment on this issue.
